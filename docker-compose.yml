# docker-compose.yml — generated by filament-plugin-workbench
#
# Installation (choose one):
#
#   # Via Composer (no PHP/Composer needed on the host — uses Docker):
#   docker run --rm -v "$(pwd):/app" -w /app composer:2 require --dev --ignore-platform-req=ext-intl coringawc/filament-plugin-workbench
#   ./vendor/bin/workbench up
#
#   # Via git submodule (HTTPS — no SSH key required):
#   git submodule add https://github.com/CoringaWc/filament-plugin-workbench.git packages/workbench
#   git submodule update --init --recursive
#   ./packages/workbench/bin/workbench up
#
#   # Via git submodule (SSH — requires an SSH key configured on GitHub):
#   git submodule add git@github.com:CoringaWc/filament-plugin-workbench.git packages/workbench
#   git submodule update --init --recursive
#   ./packages/workbench/bin/workbench up
#
# Environment variables available via .env in the plugin root:
#   WORKBENCH_PORT          → development server port (default: 8001)
#   WWWUSER                 → host user UID (default: 1000)
#   WWWGROUP                → host group GID (default: 1000)
#   DB_DATABASE             → SQLite file path inside the container (default: Testbench skeleton sqlite)
#   PHP_CLI_SERVER_WORKERS  → number of PHP CLI server workers (default: 4)

services:
  php:
    build:
      context: ./packages/workbench/docker/php
      dockerfile: Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    working_dir: /var/www/html
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    environment:
      COMPOSER_HOME: /tmp/composer
      COMPOSER_CACHE_DIR: /tmp/composer/cache
      NPM_CONFIG_CACHE: /tmp/.npm
      XDG_CACHE_HOME: /tmp/.cache
      PLAYWRIGHT_BROWSERS_PATH: /tmp/.cache/ms-playwright
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/vendor/orchestra/testbench-core/laravel/database/database.sqlite}
      WORKBENCH_PORT: ${WORKBENCH_PORT:-8001}
      PHP_CLI_SERVER_WORKERS: ${PHP_CLI_SERVER_WORKERS:-4}
    ports:
      - "${WORKBENCH_PORT:-8001}:${WORKBENCH_PORT:-8001}"
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer/cache
      - npm-cache:/tmp/.npm
      - playwright-browsers:/tmp/.cache/ms-playwright
    command:
      - sh
      - -lc
      - >
        touch vendor/orchestra/testbench-core/laravel/database/database.sqlite &&
        composer run bootstrap:workbench &&
        exec php vendor/bin/testbench serve --host=0.0.0.0 --port=${WORKBENCH_PORT:-8001} --ansi

volumes:
  composer-cache:
  npm-cache:
  playwright-browsers:
